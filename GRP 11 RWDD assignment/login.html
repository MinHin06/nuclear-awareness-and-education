<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | Nuclear Awareness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <header>
    <h1>Nuclear Awareness & Clean Energy</h1>
    <!-- Theme toggle button -->
    <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙 Dark</button>
  </header>

  <section class="login-box">
    <h2>Login</h2>

    <label>Username:</label> 
    <input type="text" id="username" />

    <label>Password:</label>
    <input type="password" id="password" />

    <button onclick="login()">Login</button>

    <hr />
    <h3>Or</h3>
    <button onclick="loginAsGuest()">Login as Guest</button>

    <p id="message"></p>
  </section>

  <script src="login.js"></script>
</body>
</html>
